name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build release binary
        run: swift build -c release
      - name: Assemble app bundle
        run: ./scripts/build-app.sh
      - name: Run tests
        run: swift test
